<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Store - Cửa hàng nhỏ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: #2c3e66;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 24px;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 28px;
        }

        .cart-count {
            position: absolute;
            top: -10px;
            right: -15px;
            background: #e11d48;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: bold;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img {
            width: 100%;
            height: 150px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin: 10px 0 5px;
        }

        .product-price {
            color: #e11d48;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .product-stock {
            font-size: 12px;
            margin-bottom: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .stock-normal {
            background: #d4edda;
            color: #155724;
        }

        .stock-low {
            background: #fff3cd;
            color: #856404;
        }

        .stock-out {
            background: #f8d7da;
            color: #721c24;
        }

        .btn-add {
            background: #2c3e66;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background: #1e2a4a;
        }

        .btn-add:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            max-width: 90vw;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            transition: right 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            background: #2c3e66;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 500;
        }

        .cart-item-price {
            color: #e11d48;
            font-size: 14px;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #e11d48;
            cursor: pointer;
            margin-left: 10px;
            font-size: 16px;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .total {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-checkout {
            width: 100%;
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-checkout:hover {
            background: #219a52;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            visibility: hidden;
            z-index: 999;
        }

        .overlay.active {
            visibility: visible;
        }

        .empty-cart {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1002;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🛍️ MINI STORE</h1>
                <small>Siêu thị mini giá tốt</small>
            </div>
            <div class="cart-icon" id="cartIcon">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>

        <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <span>🛒 GIỎ HÀNG CỦA BẠN</span>
            <button class="close-cart" id="closeCartBtn">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">🛒 Giỏ hàng đang trống</div>
        </div>
        <div class="cart-footer">
            <div class="total">
                <span>Tổng tiền:</span>
                <span id="totalPrice">0đ</span>
            </div>
            <button class="btn-checkout" id="checkoutBtn">✅ THANH TOÁN</button>
        </div>
    </div>

    <script>
        // ========== DỮ LIỆU SẢN PHẨM ==========
        let products = [
            { id: 1, name: "Áo thun Basic", price: 150000, emoji: "👕", stock: 10 },
            { id: 2, name: "Quần jean", price: 350000, emoji: "👖", stock: 8 },
            { id: 3, name: "Mũ lưỡi trai", price: 89000, emoji: "🧢", stock: 15 },
            { id: 4, name: "Giày thể thao", price: 450000, emoji: "👟", stock: 5 },
            { id: 5, name: "Balo laptop", price: 280000, emoji: "🎒", stock: 7 },
            { id: 6, name: "Đồng hồ thể thao", price: 199000, emoji: "⌚", stock: 12 }
        ];

        // ========== GIỎ HÀNG ==========
        let cart = [];

        // ========== LOCALSTORAGE ==========
        
        // Lưu sản phẩm (tồn kho) vào localStorage
        function saveProductsToLocalStorage() {
            localStorage.setItem('miniStoreProducts', JSON.stringify(products));
            console.log("💾 Đã lưu tồn kho sản phẩm vào localStorage:", products);
        }

        // Tải sản phẩm (tồn kho) từ localStorage
        function loadProductsFromLocalStorage() {
            const savedProducts = localStorage.getItem('miniStoreProducts');
            if (savedProducts) {
                products = JSON.parse(savedProducts);
                console.log("📦 Đã tải tồn kho từ localStorage:", products);
            } else {
                saveProductsToLocalStorage();
                console.log("📦 Không có dữ liệu tồn kho, khởi tạo mặc định");
            }
            renderProducts(); // Cập nhật lại giao diện
        }

        // Lưu giỏ hàng vào localStorage
        function saveCartToLocalStorage() {
            localStorage.setItem('miniStoreCart', JSON.stringify(cart));
            console.log("💾 Đã lưu giỏ hàng vào localStorage:", cart);
        }

        // Tải giỏ hàng từ localStorage
        function loadCartFromLocalStorage() {
            const savedCart = localStorage.getItem('miniStoreCart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                console.log("📦 Đã tải giỏ hàng từ localStorage:", cart);
            } else {
                cart = [];
                console.log("📦 Không có dữ liệu giỏ hàng, khởi tạo giỏ rỗng");
            }
            updateCartUI();
            updateCartCount();
        }

        // Xóa giỏ hàng khỏi localStorage
        function clearCartFromLocalStorage() {
            localStorage.removeItem('miniStoreCart');
            console.log("🗑️ Đã xóa giỏ hàng khỏi localStorage");
        }

        // ========== CÁC HÀM XỬ LÝ GIỎ HÀNG ==========

        // Thêm sản phẩm vào giỏ
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            // Kiểm tra tồn kho
            if (product.stock <= 0) {
                showToast(`⚠️ Sản phẩm "${product.name}" đã hết hàng!`);
                return;
            }
            
            if (existingItem) {
                if (existingItem.quantity < product.stock) {
                    existingItem.quantity++;
                    showToast(`✅ Đã thêm ${product.name} vào giỏ (x${existingItem.quantity})`);
                } else {
                    showToast(`⚠️ Chỉ còn ${product.stock} sản phẩm "${product.name}" trong kho!`);
                    return;
                }
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1,
                    emoji: product.emoji
                });
                showToast(`✅ Đã thêm ${product.name} vào giỏ`);
            }
            
            saveCartToLocalStorage();
            updateCartUI();
            updateCartCount();
        }

        // Cập nhật số lượng sản phẩm trong giỏ
        function updateQuantity(productId, delta) {
            const item = cart.find(item => item.id === productId);
            const product = products.find(p => p.id === productId);
            
            if (item) {
                const newQuantity = item.quantity + delta;
                if (newQuantity <= 0) {
                    cart = cart.filter(item => item.id !== productId);
                    showToast(`🗑️ Đã xóa ${product.name} khỏi giỏ`);
                } else if (newQuantity <= product.stock) {
                    item.quantity = newQuantity;
                    showToast(`🔄 Đã cập nhật số lượng ${product.name}: ${newQuantity}`);
                } else {
                    showToast(`⚠️ Chỉ còn ${product.stock} sản phẩm "${product.name}" trong kho!`);
                    return;
                }
                
                saveCartToLocalStorage();
                updateCartUI();
                updateCartCount();
            }
        }

        // Xóa sản phẩm khỏi giỏ
        function removeFromCart(productId) {
            const product = products.find(p => p.id === productId);
            cart = cart.filter(item => item.id !== productId);
            
            saveCartToLocalStorage();
            updateCartUI();
            updateCartCount();
            showToast(`🗑️ Đã xóa ${product.name} khỏi giỏ`);
        }

        // ========== THANH TOÁN - TRỪ TỒN KHO VÀ XÓA GIỎ ==========
        function checkout() {
            // Kiểm tra giỏ hàng có trống không
            if (cart.length === 0) {
                showToast('🛒 Giỏ hàng trống! Hãy thêm sản phẩm trước khi thanh toán.');
                return;
            }
            
            // Kiểm tra lại tồn kho lần cuối (đề phòng có người mua cùng lúc)
            let hasError = false;
            for (const item of cart) {
                const product = products.find(p => p.id === item.id);
                if (product.stock < item.quantity) {
                    showToast(`⚠️ Sản phẩm "${product.name}" chỉ còn ${product.stock} trong kho!`);
                    hasError = true;
                    return;
                }
            }
            
            if (hasError) return;
            
            // 🔥 QUAN TRỌNG 1: TRỪ SỐ LƯỢNG TỒN KHO
            for (const item of cart) {
                const product = products.find(p => p.id === item.id);
                product.stock -= item.quantity;
                console.log(`📉 Đã trừ ${item.quantity} của "${product.name}". Tồn kho còn: ${product.stock}`);
            }
            
            // 🔥 QUAN TRỌNG 2: LƯU TỒN KHO MỚI VÀO LOCALSTORAGE
            saveProductsToLocalStorage();
            
            // Tính tổng tiền và tổng số sản phẩm để thông báo
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalMoney = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            // Hiển thị thông báo
            alert(`🎉 THANH TOÁN THÀNH CÔNG!\n\n📦 Tổng số sản phẩm: ${totalItems}\n💰 Tổng tiền: ${formatPrice(totalMoney)}\n\nCảm ơn bạn đã mua hàng tại Mini Store!`);
            showToast(`🎉 Thanh toán thành công! Đã trừ ${totalItems} sản phẩm trong kho`);
            
            // 🔥 QUAN TRỌNG 3: XÓA GIỎ HÀNG
            cart = [];
            
            // 🔥 QUAN TRỌNG 4: XÓA GIỎ HÀNG KHỎI LOCALSTORAGE
            clearCartFromLocalStorage();
            
            // Cập nhật lại giao diện
            updateCartUI();
            updateCartCount();
            renderProducts(); // Cập nhật lại hiển thị tồn kho trên sản phẩm
            
            // Đóng sidebar giỏ hàng
            closeCart();
        }

        // ========== HIỂN THỊ GIAO DIỆN ==========

        // Cập nhật hiển thị giỏ hàng trong sidebar
        function updateCartUI() {
            const cartItemsDiv = document.getElementById('cartItems');
            const totalSpan = document.getElementById('totalPrice');
            
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<div class="empty-cart">🛒 Giỏ hàng đang trống</div>';
                totalSpan.innerText = '0đ';
                return;
            }
            
            let html = '';
            let total = 0;
            
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.emoji} ${item.name}</div>
                            <div class="cart-item-price">${formatPrice(item.price)}</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });
            
            cartItemsDiv.innerHTML = html;
            totalSpan.innerText = formatPrice(total);
        }

        // Cập nhật số lượng hiển thị trên icon giỏ hàng
        function updateCartCount() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').innerText = totalItems;
        }

        // Định dạng giá tiền
        function formatPrice(price) {
            return price.toLocaleString('vi-VN') + 'đ';
        }

        // Hiển thị thông báo (toast message)
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Lấy class cho stock dựa trên số lượng
        function getStockClass(stock) {
            if (stock <= 0) return 'stock-out';
            if (stock <= 3) return 'stock-low';
            return 'stock-normal';
        }

        // Lấy text cho stock
        function getStockText(stock) {
            if (stock <= 0) return '🔥 HẾT HÀNG';
            if (stock <= 3) return `⚠️ SẮP HẾT (còn ${stock})`;
            return `📦 Còn ${stock}`;
        }

        // Hiển thị danh sách sản phẩm
        function renderProducts() {
            const productGrid = document.getElementById('productGrid');
            productGrid.innerHTML = products.map(product => {
                const stockClass = getStockClass(product.stock);
                const stockText = getStockText(product.stock);
                const isDisabled = product.stock <= 0;
                
                return `
                    <div class="product-card">
                        <div class="product-img">${product.emoji}</div>
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${formatPrice(product.price)}</div>
                        <div class="product-stock ${stockClass}">${stockText}</div>
                        <button class="btn-add" onclick="addToCart(${product.id})" ${isDisabled ? 'disabled' : ''}>
                            ${isDisabled ? '❌ Hết hàng' : '➕ Thêm vào giỏ'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ========== MỞ/ĐÓNG GIỎ HÀNG ==========
        function openCart() {
            document.getElementById('cartSidebar').classList.add('open');
            document.getElementById('overlay').classList.add('active');
        }

        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        // ========== KHỞI TẠO TRANG ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadProductsFromLocalStorage();  // Tải tồn kho từ localStorage
            loadCartFromLocalStorage();      // Tải giỏ hàng từ localStorage
            
            // Gắn sự kiện
            document.getElementById('cartIcon').addEventListener('click', openCart);
            document.getElementById('closeCartBtn').addEventListener('click', closeCart);
            document.getElementById('overlay').addEventListener('click', closeCart);
            document.getElementById('checkoutBtn').addEventListener('click', checkout);
        });
    </script>
</body>
</html>
